  <!-- 구글 폰트 적용 (한글: Gamja Flower, 영문: Roboto Condensed 100) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    /* 디자인 시스템 및 CSS 변수 정의 */
    :root {
      --primary-color: #E50018; /* 학원 공식 로고 레드 */
      --primary-hover: #C20014;
      --bg-gradient-start: #e8f0fe; /* 신뢰감을 주는 부드러운 파스텔 블루 */
      --bg-gradient-end: #c7dcfc;
      --card-bg: rgba(255, 255, 255, 0.95); /* 미세 투명도가 가미된 카드 배경 */
      --text-main: #2d3748; /* 가독성을 위한 깊이 있는 슬레이트 다크 */
      --text-muted: #718096;
      --shadow-normal: 0 15px 35px rgba(103, 118, 142, 0.18), 0 5px 15px rgba(103, 118, 142, 0.1);
      --shadow-hover: 0 30px 60px rgba(103, 118, 142, 0.3), 0 15px 25px rgba(103, 118, 142, 0.18);
      --border-light: rgba(255, 255, 255, 0.7);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Gamja Flower", cursive, sans-serif; /* 기본 한글 글꼴 적용 */
    }

    /* 영문 및 숫자 전용 세련된 Roboto Condensed 폰트 스타일 */
    .font-en {
      font-family: "Roboto Condensed", sans-serif;
      font-weight: 100;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at 50% 50%, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      padding: 20px;
      overflow-x: hidden;
    }

    /* 입체감이 돋보이는 명함 카드 */
    .card-container {
      position: relative;
      width: 100%;
      max-width: 380px;
      perspective: 1000px; /* 3D 입체 효과 구현을 위한 원근감 설정 */
    }

    .card {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 35px 30px;
      box-shadow: var(--shadow-normal);
      border: 1px solid var(--border-light);
      text-align: center;
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.5s ease;
      position: relative;
      overflow: hidden;
    }

    /* 마우스 호버 시 붕 떠오르는 입체 효과 */
    .card-container:hover .card {
      transform: translateY(-10px) rotateX(2deg) rotateY(-2deg);
      box-shadow: var(--shadow-hover);
    }

    /* 카드 배경에 은은하게 들어간 글로우 효과 */
    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(229, 0, 24, 0.03) 0%, transparent 70%);
      pointer-events: none;
    }

    /* 학원 로고 영역 스타일 */
    .logo-area {
      margin-top: 5px;
      margin-bottom: 25px;
      display: inline-block;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.4s ease;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.08));
    }

    /* 로고 이미지 크기 조절 */
    .logo-img {
      display: block;
      width: 80px; /* 명함에 맞춘 정사각형 로고 가로 크기 */
      height: 80px; /* 명함에 맞춘 정사각형 로고 세로 크기 */
      border-radius: 18px; /* 모서리 둥글게 깎기 */
      object-fit: cover;
    }

    /* 마우스 롤오버 시 회전 및 입체 그림자 효과 */
    .card-container:hover .logo-area {
      transform: scale(1.06) rotate(3deg);
      filter: drop-shadow(0 10px 20px rgba(229, 0, 24, 0.25));
    }

    /* 학원 이름 및 소개 */
    .academy-name {
      font-size: 1.45rem;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .academy-intro {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 30px;
      word-break: keep-all;
    }

    /* 분구선 (Divider) */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.08) 20%, rgba(0, 0, 0, 0.08) 80%, transparent);
      margin-bottom: 25px;
    }

    /* 상세 정보 영역 */
    .info-list {
      list-style: none;
      text-align: left;
      margin-bottom: 30px;
    }

    .info-item {
      display: flex;
      align-items: center;
      margin-bottom: 18px;
      padding: 6px 8px;
      border-radius: 12px;
      transition: background-color 0.3s ease;
    }

    .info-item:hover {
      background-color: rgba(0, 0, 0, 0.02);
    }

    /* 아이콘 원형 배경 스타일 */
    .info-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background-color: rgba(229, 0, 24, 0.06);
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 15px;
      flex-shrink: 0;
      color: var(--primary-color);
      transition: transform 0.3s ease;
    }

    .info-item:hover .info-icon {
      transform: scale(1.1);
      background-color: var(--primary-color);
      color: #ffffff;
    }

    .info-icon svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .info-details {
      display: flex;
      flex-direction: column;
    }

    .info-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .info-value {
      font-size: 0.95rem;
      color: var(--text-main);
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    a.info-value:hover {

    /* 하단 액션 버튼 그룹 (모바일에서 전화 걸기 극대화) */
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);

    .btn-call:hover {

      box-shadow: 0 6px 16px rgba(229, 0, 24, 0.35);
      transform: translateY(-2px);
    }

    .btn-call:active {

    /* 서브 홈페이지 버튼 */

    }
  </style>
</head>
